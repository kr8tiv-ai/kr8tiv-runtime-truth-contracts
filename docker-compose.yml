# KIN Platform - Docker Compose Configuration
# 
# Usage:
#   Production: docker compose up -d
#   Development: docker compose --profile dev up -d

services:
  # ===========================================================================
  # API Server
  # ===========================================================================
  api:
    build:
      context: .
      target: production
    container_name: kin-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - TAILSCALE_API_KEY=${TAILSCALE_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - DATABASE_PATH=/app/data/kin.db
    volumes:
      - kin-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kin-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Telegram Bot
  # ===========================================================================
  bot:
    build:
      context: .
      target: production
    container_name: kin-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - DATABASE_PATH=/app/data/kin.db
    volumes:
      - kin-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kin-network
    command: ["node", "dist/bot/telegram-bot.js"]
    depends_on:
      api:
        condition: service_healthy

  # ===========================================================================
  # Health Monitor (Python Daemon)
  # ===========================================================================
  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile.health
    container_name: kin-health
    restart: unless-stopped
    environment:
      - HEALTH_CHECK_INTERVAL=30
      - API_HEALTH_URL=http://api:3000/health/live
      - BOT_HEALTH_URL=http://bot:3000/health/live
    networks:
      - kin-network
    depends_on:
      api:
        condition: service_healthy

  # ===========================================================================
  # Development Profile (hot reload)
  # ===========================================================================
  dev:
    profiles:
      - dev
    build:
      context: .
      target: development
    container_name: kin-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - kin-data:/app/data
    networks:
      - kin-network
    command: ["npm", "run", "dev"]

networks:
  kin-network:
    driver: bridge

volumes:
  kin-data:
